# PostgreSQL 15+ and Redis for Identity Observability (local dev)
# Run: docker compose up -d

services:
  postgres:
    # Using TimescaleDB for time-series event storage
    image: timescale/timescaledb:latest-pg16
    container_name: identity-observability-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-observability}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-observability_dev}
      POSTGRES_DB: ${POSTGRES_DB:-identity_observability}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-observability} -d ${POSTGRES_DB:-identity_observability}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: identity-observability-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: identity-observability-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/observability_dev}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "${NEO4J_PORT:-7474}:7474"  # HTTP
      - "${NEO4J_BOLT_PORT:-7687}:7687"  # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "observability_dev", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  neo4j_logs: