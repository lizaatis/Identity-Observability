# PostgreSQL 15+ and Redis for Identity Observability (local dev)
# Run: docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: identity-observability-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-observability}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-observability_dev}
      POSTGRES_DB: ${POSTGRES_DB:-identity_observability}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-observability} -d ${POSTGRES_DB:-identity_observability}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: identity-observability-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
